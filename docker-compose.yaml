version: "3.9"
services:
  # --- MeshCom Listener (The Bridge) ---
  listener:
    build: .
    container_name: meshcom-listener
    restart: unless-stopped
    ports:
      - "1799:1799/udp"
    env_file: .env
    depends_on:
      - surrealdb
      - apprise

  # --- SurrealDB (The Smart Database) ---
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: meshcom-db
    command: start --user root --pass root --log info rocksdb:/mydata/meshcom.db
    ports:
      - "8000:8000"
    volumes:
      - ./db:/mydata
    restart: unless-stopped

  # --- Apprise API (The Notification Hub) ---
  apprise:
    image: caronc/apprise
    container_name: meshcom-apprise
    restart: unless-stopped
    # Internal communication on port 8000 (default)
    # ports:
    #   - "8001:8000" # Optional: Expose externally if needed
